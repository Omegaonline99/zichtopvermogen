<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Platform</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .button {
      display: inline-block;
      padding: 14px 24px;
      background: #111827;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .tags {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tag {
      background: #e5e7eb;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="card">
      <h1>Portfolio Platform</h1>
      <p>
        Eén centrale plek om jouw vermogen te beheren, te volgen en later uit te breiden
        met slimme inzichten over aandelen, obligaties, commodity’s, vastgoed en crypto.
      </p>
      <a href="#" class="button">Start hier</a>

      <div class="tags">
        <div class="tag">Aandelen</div>
        <div class="tag">Bonds</div>
        <div class="tag">Commodity’s</div>
        <div class="tag">Vastgoed</div>
        <div class="tag">Crypto</div>
      </div>
    </div>
  </section>
</body>
</html>
